version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: syncfy-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: syncfy_triage
      MYSQL_USER: user_syncfy
      MYSQL_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
